<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c6ef5"/>
      <stop offset="50%" style="stop-color:#3b5bdb"/>
      <stop offset="100%" style="stop-color:#364fc7"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- 剪贴板渐变 -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <!-- 勾选渐变 -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20c997"/>
      <stop offset="100%" style="stop-color:#12b886"/>
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <!-- 圆角矩形裁剪 -->
    <clipPath id="roundClip">
      <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#shine)"/>

  <!-- 装饰圆点 -->
  <circle cx="180" cy="180" r="60" fill="rgba(255,255,255,0.06)"/>
  <circle cx="850" cy="250" r="40" fill="rgba(255,255,255,0.04)"/>
  <circle cx="900" cy="800" r="50" fill="rgba(255,255,255,0.05)"/>
  <circle cx="150" cy="750" r="35" fill="rgba(255,255,255,0.04)"/>

  <!-- 剪贴板主体 -->
  <g transform="translate(512, 512)" filter="url(#shadow)">
    <!-- 剪贴板底板 -->
    <rect x="-200" y="-240" width="400" height="480" rx="32" ry="32" fill="url(#boardGrad)" opacity="0.95"/>

    <!-- 夹子 -->
    <rect x="-110" y="-290" width="220" height="100" rx="24" ry="24" fill="white" opacity="0.95"/>
    <rect x="-75" y="-275" width="150" height="70" rx="16" ry="16" fill="url(#bgGrad)" opacity="0.2"/>

    <!-- 内容行 -->
    <rect x="-140" y="-110" width="280" height="16" rx="8" ry="8" fill="#4c6ef5" opacity="0.15"/>
    <rect x="-140" y="-70" width="220" height="16" rx="8" ry="8" fill="#4c6ef5" opacity="0.12"/>
    <rect x="-140" y="-30" width="260" height="16" rx="8" ry="8" fill="#4c6ef5" opacity="0.15"/>
    <rect x="-140" y="10" width="180" height="16" rx="8" ry="8" fill="#4c6ef5" opacity="0.12"/>
    <rect x="-140" y="50" width="240" height="16" rx="8" ry="8" fill="#4c6ef5" opacity="0.1"/>
    <rect x="-140" y="90" width="200" height="16" rx="8" ry="8" fill="#4c6ef5" opacity="0.08"/>

    <!-- 勾选圆圈 -->
    <circle cx="130" cy="150" r="52" fill="url(#checkGrad)" filter="url(#innerShadow)"/>
    <!-- 勾选 -->
    <path d="M108 150 L124 166 L154 136" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 顶部高光 -->
  <ellipse cx="512" cy="200" rx="300" ry="80" fill="rgba(255,255,255,0.05)"/>
</svg>