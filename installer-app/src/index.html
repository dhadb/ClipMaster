<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipMaster 安装向导</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .installer {
      width: 580px;
      height: 460px;
      background: linear-gradient(135deg, #141517 0%, #1a1b1e 50%, #1e1f23 100%);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 25px 60px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 0 80px rgba(76,110,245,0.1);
      position: relative;
    }

    /* Animated background */
    .bg-animation {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 0;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(76,110,245,0.15) 0%, transparent 70%);
      animation: float 8s infinite ease-in-out;
    }

    .bg-circle:nth-child(1) { width: 300px; height: 300px; top: -100px; right: -50px; animation-delay: 0s; }
    .bg-circle:nth-child(2) { width: 200px; height: 200px; bottom: -80px; left: -30px; animation-delay: 2s; }
    .bg-circle:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 50%; animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      50% { transform: translate(30px, -30px) scale(1.1); opacity: 0.8; }
    }

    /* Particles */
    .particles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(76,110,245,0.4);
      border-radius: 50%;
      animation: particleFloat 6s infinite;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4c6ef5, #3b5bdb);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(76,110,245,0.3);
      animation: logoPulse 2s infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(76,110,245,0.3); }
      50% { box-shadow: 0 4px 25px rgba(76,110,245,0.5); }
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .close-btn:hover {
      background: rgba(255,59,48,0.2);
      color: #ff3b30;
    }

    /* Pages */
    .page {
      flex: 1;
      padding: 0 32px 24px;
      display: none;
      animation: pageEnter 0.4s ease-out;
    }

    .page.active { display: flex; flex-direction: column; }

    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Welcome Page */
    .welcome-icon {
      width: 80px;
      height: 80px;
      margin: 10px auto 20px;
      background: linear-gradient(135deg, rgba(76,110,245,0.2), rgba(59,91,219,0.2));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(76,110,245,0.2);
      animation: iconBounce 2s infinite;
    }

    @keyframes iconBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-icon svg { width: 40px; height: 40px; }

    .welcome-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      margin-bottom: 8px;
    }

    .welcome-desc {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
      animation: featureSlide 0.5s ease-out backwards;
    }

    .feature:nth-child(1) { animation-delay: 0.1s; }
    .feature:nth-child(2) { animation-delay: 0.2s; }
    .feature:nth-child(3) { animation-delay: 0.3s; }
    .feature:nth-child(4) { animation-delay: 0.4s; }

    @keyframes featureSlide {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .feature-icon {
      width: 32px;
      height: 32px;
      background: rgba(76,110,245,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    .feature-text {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      line-height: 1.4;
    }

    .install-path {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 20px;
    }

    .install-path-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }

    .install-path-value {
      flex: 1;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      font-family: 'Consolas', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .install-path-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .install-path-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4c6ef5, #3b5bdb);
      color: white;
      box-shadow: 0 4px 15px rgba(76,110,245,0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #5c7cfa, #4c6ef5);
      box-shadow: 0 6px 20px rgba(76,110,245,0.4);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Progress Page */
    .progress-page {
      align-items: center;
      justify-content: center;
    }

    .progress-icon {
      width: 100px;
      height: 100px;
      margin-bottom: 30px;
      position: relative;
    }

    .progress-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 6;
    }

    .progress-ring-fill {
      fill: none;
      stroke: url(#progressGradient);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transition: stroke-dashoffset 0.3s ease;
    }

    .progress-percentage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    .progress-title {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 8px;
    }

    .progress-file {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      font-family: 'Consolas', monospace;
      margin-bottom: 24px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-bar-container {
      width: 100%;
      max-width: 350px;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4c6ef5, #748ffc);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .progress-stats {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* Success animation */
    .success-check {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(32,201,151,0.2), rgba(18,184,134,0.2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(32,201,151,0.3);
      animation: successPop 0.5s ease-out;
    }

    @keyframes successPop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-check svg {
      width: 36px;
      height: 36px;
      stroke: #20c997;
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: checkDraw 0.5s 0.3s forwards;
    }

    @keyframes checkDraw {
      to { stroke-dashoffset: 0; }
    }

    .success-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      margin-bottom: 8px;
    }

    .success-desc {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .success-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .success-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .success-option:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(76,110,245,0.2);
    }

    .success-option-icon {
      width: 40px;
      height: 40px;
      background: rgba(76,110,245,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .success-option-text {
      flex: 1;
    }

    .success-option-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 2px;
    }

    .success-option-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    .success-option-arrow {
      color: rgba(255,255,255,0.2);
      font-size: 18px;
    }

    /* Status bar */
    .status-bar {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .status-text {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
    }

    .status-dots {
      display: flex;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.3s;
    }

    .status-dot.active {
      background: #4c6ef5;
      box-shadow: 0 0 10px rgba(76,110,245,0.5);
    }
  </style>
</head>
<body>
  <div class="installer">
    <!-- Animated Background -->
    <div class="bg-animation">
      <div class="bg-circle"></div>
      <div class="bg-circle"></div>
      <div class="bg-circle"></div>
    </div>
    <div class="particles" id="particles"></div>

    <!-- Content -->
    <div class="content">
      <!-- Header -->
      <div class="header">
        <div class="logo-area">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
              <path d="M9 14l2 2 4-4"/>
            </svg>
          </div>
          <div class="logo-text">
            <div class="logo-title">ClipMaster</div>
            <div class="logo-subtitle">安装向导</div>
          </div>
        </div>
        <button class="close-btn" onclick="closeInstaller()">×</button>
      </div>

      <!-- Welcome Page -->
      <div class="page active" id="welcomePage">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(76,110,245,0.8)" stroke-width="1.5">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            <path d="M9 14l2 2 4-4"/>
          </svg>
        </div>

        <h1 class="welcome-title">欢迎安装 ClipMaster</h1>
        <p class="welcome-desc">一款功能强大、界面美观的现代化剪贴板管理器</p>

        <div class="features">
          <div class="feature">
            <div class="feature-icon">📋</div>
            <div class="feature-text">实时监控剪贴板</div>
          </div>
          <div class="feature">
            <div class="feature-icon">🔍</div>
            <div class="feature-text">智能搜索过滤</div>
          </div>
          <div class="feature">
            <div class="feature-icon">⭐</div>
            <div class="feature-text">收藏重要内容</div>
          </div>
          <div class="feature">
            <div class="feature-icon">⌨️</div>
            <div class="feature-text">全局快捷键</div>
          </div>
        </div>

        <div class="install-path">
          <span class="install-path-label">安装目录</span>
          <span class="install-path-value" id="installPath">加载中...</span>
          <button class="install-path-btn" onclick="selectFolder()">更改</button>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="startInstall()">立即安装</button>
        </div>
      </div>

      <!-- Progress Page -->
      <div class="page progress-page" id="progressPage">
        <div class="progress-icon">
          <svg class="progress-ring" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#4c6ef5"/>
                <stop offset="100%" style="stop-color:#748ffc"/>
              </linearGradient>
            </defs>
            <circle class="progress-ring-bg" cx="50" cy="50" r="45"/>
            <circle class="progress-ring-fill" id="progressRing" cx="50" cy="50" r="45"/>
          </svg>
          <div class="progress-percentage" id="progressPercent">0%</div>
        </div>

        <div class="progress-title">正在安装...</div>
        <div class="progress-file" id="progressFile">准备中</div>

        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="progress-stats" id="progressStats">0 / 0 文件</div>
      </div>

      <!-- Success Page -->
      <div class="page" id="successPage">
        <div class="success-check">
          <svg viewBox="0 0 24 24">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>

        <h2 class="success-title">安装完成！</h2>
        <p class="success-desc">ClipMaster 已成功安装到您的电脑<br>使用 Ctrl+Shift+V 快速唤起</p>

        <div class="success-options">
          <div class="success-option" onclick="launchApp()">
            <div class="success-option-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4c6ef5" stroke-width="2">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                <path d="M9 14l2 2 4-4"/>
              </svg>
            </div>
            <div class="success-option-text">
              <div class="success-option-title">启动 ClipMaster</div>
              <div class="success-option-desc">立即开始使用</div>
            </div>
            <div class="success-option-arrow">→</div>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-secondary" onclick="closeInstaller()">完成</button>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-text">ClipMaster v1.0.0</span>
        <div class="status-dots">
          <div class="status-dot active" id="dot1"></div>
          <div class="status-dot" id="dot2"></div>
          <div class="status-dot" id="dot3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    // Create particles
    function createParticles() {
      const container = document.getElementById('particles')
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div')
        particle.className = 'particle'
        particle.style.left = Math.random() * 100 + '%'
        particle.style.animationDelay = Math.random() * 6 + 's'
        particle.style.animationDuration = (4 + Math.random() * 4) + 's'
        container.appendChild(particle)
      }
    }
    createParticles()

    // Load install path
    async function loadInstallPath() {
      const path = await ipcRenderer.invoke('get-install-path')
      document.getElementById('installPath').textContent = path
    }
    loadInstallPath()

    // Select folder
    async function selectFolder() {
      const path = await ipcRenderer.invoke('select-folder')
      if (path) {
        document.getElementById('installPath').textContent = path
      }
    }

    // Start installation
    async function startInstall() {
      // Switch to progress page
      document.getElementById('welcomePage').classList.remove('active')
      document.getElementById('progressPage').classList.add('active')
      document.getElementById('dot2').classList.add('active')

      // Start installation
      const result = await ipcRenderer.invoke('start-install')

      if (result.success) {
        // Switch to success page
        document.getElementById('progressPage').classList.remove('active')
        document.getElementById('successPage').classList.add('active')
        document.getElementById('dot3').classList.add('active')
      } else {
        alert('安装失败: ' + result.error)
      }
    }

    // Listen for progress updates
    ipcRenderer.on('install-progress', (event, data) => {
      const { progress, current, total, file } = data

      // Update progress ring
      const ring = document.getElementById('progressRing')
      const circumference = 2 * Math.PI * 45
      ring.style.strokeDashoffset = circumference - (progress / 100) * circumference

      // Update percentage
      document.getElementById('progressPercent').textContent = progress + '%'

      // Update progress bar
      document.getElementById('progressBar').style.width = progress + '%'

      // Update file info
      document.getElementById('progressFile').textContent = file

      // Update stats
      document.getElementById('progressStats').textContent = `${current} / ${total} 文件`
    })

    // Launch app
    function launchApp() {
      ipcRenderer.invoke('launch-app')
    }

    // Close installer
    function closeInstaller() {
      ipcRenderer.invoke('close-installer')
    }
  </script>
</body>
</html>
