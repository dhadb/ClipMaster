<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClipMaster 安装向导</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .installer {
      width: 580px;
      height: 460px;
      background: linear-gradient(135deg, #141517 0%, #1a1b1e 50%, #1e1f23 100%);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 25px 60px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 0 80px rgba(76,110,245,0.1);
      position: relative;
    }

    /* Animated background */
    .bg-animation {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 0;
    }

    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(76,110,245,0.15) 0%, transparent 70%);
      animation: float 8s infinite ease-in-out;
    }

    .bg-circle:nth-child(1) { width: 300px; height: 300px; top: -100px; right: -50px; animation-delay: 0s; }
    .bg-circle:nth-child(2) { width: 200px; height: 200px; bottom: -80px; left: -30px; animation-delay: 2s; }
    .bg-circle:nth-child(3) { width: 150px; height: 150px; top: 50%; left: 50%; animation-delay: 4s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      50% { transform: translate(30px, -30px) scale(1.1); opacity: 0.8; }
    }

    /* Particles */
    .particles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(76,110,245,0.4);
      border-radius: 50%;
      animation: particleFloat 6s infinite;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-app-region: drag;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #4c6ef5, #3b5bdb);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(76,110,245,0.3);
      animation: logoPulse 2s infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 4px 15px rgba(76,110,245,0.3); }
      50% { box-shadow: 0 4px 25px rgba(76,110,245,0.5); }
    }

    .logo-icon svg { width: 22px; height: 22px; }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      letter-spacing: -0.3px;
    }

    .logo-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }

    .close-btn {
      -webkit-app-region: no-drag;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .close-btn:hover {
      background: rgba(255,59,48,0.2);
      color: #ff3b30;
    }

    /* Pages */
    .page {
      flex: 1;
      padding: 0 32px 24px;
      display: none;
      animation: pageEnter 0.46s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
    }

    .page.active { display: flex; flex-direction: column; }

    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(18px) scale(0.985); filter: blur(4px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    /* Welcome Page */
    .welcome-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, rgba(76,110,245,0.2), rgba(59,91,219,0.2));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(76,110,245,0.2);
      animation: iconBounce 2s infinite;
    }

    @keyframes iconBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-icon svg { width: 32px; height: 32px; }

    .welcome-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      margin-bottom: 6px;
    }

    .welcome-desc {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
      animation: featureSlide 0.5s ease-out backwards;
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), background 0.28s, border-color 0.28s, box-shadow 0.28s;
    }

    .feature:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.055);
      border-color: rgba(76,110,245,0.24);
      box-shadow: 0 10px 28px rgba(76,110,245,0.12);
    }

    .feature:nth-child(1) { animation-delay: 0.1s; }
    .feature:nth-child(2) { animation-delay: 0.2s; }
    .feature:nth-child(3) { animation-delay: 0.3s; }
    .feature:nth-child(4) { animation-delay: 0.4s; }

    @keyframes featureSlide {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .feature-icon {
      width: 28px;
      height: 28px;
      background: rgba(76,110,245,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
    }

    .feature-text {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      line-height: 1.4;
    }

    .install-path {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 12px;
    }

    .install-path-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }

    .install-path-value {
      flex: 1;
      min-width: 0;
      font-size: 12px;
      color: rgba(255,255,255,0.78);
      font-family: 'Consolas', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: transparent;
      border: none;
      outline: none;
      -webkit-app-region: no-drag;
    }

    .install-path-value::placeholder {
      color: rgba(255,255,255,0.28);
    }

    .install-path-value:focus {
      color: rgba(255,255,255,0.94);
    }

    .install-path-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .install-path-btn:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.28s, background 0.28s, color 0.28s, border-color 0.28s;
      -webkit-app-region: no-drag;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -120%;
      width: 70%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      transform: skewX(-18deg);
      transition: left 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .btn:hover::before { left: 130%; }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.8);
    }

    .btn-primary {
      background: linear-gradient(135deg, #4c6ef5, #3b5bdb);
      color: white;
      box-shadow: 0 4px 15px rgba(76,110,245,0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #5c7cfa, #4c6ef5);
      box-shadow: 0 10px 28px rgba(76,110,245,0.45), 0 0 0 1px rgba(255,255,255,0.08) inset;
      transform: translateY(-2px) scale(1.015);
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.985);
    }

    .btn-secondary:hover {
      transform: translateY(-1px);
    }

    .btn-secondary:active {
      transform: scale(0.985);
    }

    /* Special Premium Page */
    .special-page {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-bottom: 20px;
    }

    .premium-stage {
      width: 152px;
      height: 152px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      border-radius: 38px;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.16), transparent 28%),
        linear-gradient(135deg, rgba(99,102,241,0.18), rgba(167,139,250,0.08));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 24px 55px rgba(76,110,245,0.22),
        0 0 0 1px rgba(255,255,255,0.04) inset;
      overflow: hidden;
      animation: premiumStageEnter 0.74s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .premium-stage::before,
    .premium-stage::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .premium-stage::before {
      width: 112px;
      height: 112px;
      background: radial-gradient(circle, rgba(116,143,252,0.36), transparent 68%);
      animation: premiumGlowPulse 2.4s ease-in-out infinite;
    }

    .premium-stage::after {
      width: 220px;
      height: 46px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.17), transparent);
      transform: rotate(-28deg) translateX(-95px);
      animation: premiumSweep 2.6s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }

    .premium-orb {
      position: absolute;
      width: 86px;
      height: 86px;
      border-radius: 28px;
      background: linear-gradient(135deg, #6366f1 0%, #748ffc 48%, #a78bfa 100%);
      box-shadow:
        0 18px 45px rgba(99,102,241,0.45),
        0 0 28px rgba(167,139,250,0.35) inset;
      animation: premiumOrbFloat 3s ease-in-out infinite;
    }

    .premium-ring {
      position: absolute;
      width: 122px;
      height: 122px;
      border-radius: 50%;
      border: 1px solid rgba(116,143,252,0.34);
      border-top-color: rgba(255,255,255,0.9);
      border-right-color: rgba(167,139,250,0.6);
      animation: premiumRingSpin 7s linear infinite;
    }

    .premium-ring.secondary {
      width: 104px;
      height: 104px;
      border-color: rgba(255,255,255,0.12);
      border-left-color: rgba(116,143,252,0.68);
      border-bottom-color: rgba(99,102,241,0.58);
      animation-direction: reverse;
      animation-duration: 9s;
    }

    .premium-core {
      position: relative;
      z-index: 2;
      width: 62px;
      height: 62px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 12px 24px rgba(0,0,0,0.22);
      backdrop-filter: blur(12px);
      animation: premiumCoreBounce 0.78s 0.18s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .premium-core svg {
      width: 32px;
      height: 32px;
      stroke: white;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.26));
    }

    .premium-title {
      font-size: 23px;
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: -0.6px;
      color: rgba(255,255,255,0.96);
      margin-bottom: 8px;
      animation: premiumTextEnter 0.54s 0.18s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .premium-desc {
      max-width: 390px;
      color: rgba(255,255,255,0.54);
      font-size: 13px;
      line-height: 1.65;
      margin-bottom: 18px;
      animation: premiumTextEnter 0.54s 0.26s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .premium-chips {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .premium-chip {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.72);
      font-size: 11px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      animation: premiumChipPop 0.52s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .premium-chip:nth-child(1) { animation-delay: 0.36s; }
    .premium-chip:nth-child(2) { animation-delay: 0.44s; }
    .premium-chip:nth-child(3) { animation-delay: 0.52s; }
    .premium-chip:nth-child(4) { animation-delay: 0.60s; }

    .premium-loading-line {
      width: 230px;
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      animation: premiumTextEnter 0.5s 0.68s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .premium-loading-line::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -35%;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, #748ffc, #a78bfa, transparent);
      box-shadow: 0 0 18px rgba(116,143,252,0.55);
      animation: premiumLineFlow 1.18s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }

    @keyframes premiumStageEnter {
      0% { opacity: 0; transform: translateY(18px) scale(0.78) rotate(-3deg); }
      62% { opacity: 1; transform: translateY(-4px) scale(1.045) rotate(1deg); }
      100% { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
    }

    @keyframes premiumGlowPulse {
      0%, 100% { transform: scale(0.9); opacity: 0.45; }
      50% { transform: scale(1.16); opacity: 0.85; }
    }

    @keyframes premiumSweep {
      0% { transform: rotate(-28deg) translateX(-130px); opacity: 0; }
      18% { opacity: 0.9; }
      58%, 100% { transform: rotate(-28deg) translateX(130px); opacity: 0; }
    }

    @keyframes premiumOrbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-7px) scale(1.035); }
    }

    @keyframes premiumRingSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes premiumCoreBounce {
      0% { opacity: 0; transform: scale(0.48) rotate(-8deg); }
      58% { opacity: 1; transform: scale(1.16) rotate(3deg); }
      78% { transform: scale(0.96) rotate(-1deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes premiumTextEnter {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes premiumChipPop {
      0% { opacity: 0; transform: translateY(12px) scale(0.74); }
      68% { opacity: 1; transform: translateY(-2px) scale(1.08); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes premiumLineFlow {
      0% { left: -42%; }
      100% { left: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Progress Page */
    .progress-page {
      align-items: center;
      justify-content: center;
    }

    .progress-icon {
      width: 100px;
      height: 100px;
      margin-bottom: 30px;
      position: relative;
    }

    .progress-ring {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 6;
    }

    .progress-ring-fill {
      fill: none;
      stroke: url(#progressGradient);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transition: stroke-dashoffset 0.3s ease;
    }

    .progress-percentage {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }

    .progress-title {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 8px;
    }

    .progress-file {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      font-family: 'Consolas', monospace;
      margin-bottom: 24px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-bar-container {
      width: 100%;
      max-width: 350px;
      height: 8px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4c6ef5, #748ffc);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;
      position: relative;
    }

    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .progress-stats {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    /* Success animation */
    .success-check {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(32,201,151,0.2), rgba(18,184,134,0.2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(32,201,151,0.3);
      animation: successPop 0.5s ease-out;
    }

    @keyframes successPop {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-check svg {
      width: 36px;
      height: 36px;
      stroke: #20c997;
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: checkDraw 0.5s 0.3s forwards;
    }

    @keyframes checkDraw {
      to { stroke-dashoffset: 0; }
    }

    .success-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: rgba(255,255,255,0.95);
      margin-bottom: 8px;
    }

    .success-desc {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .success-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .success-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1), background 0.28s, border-color 0.28s, box-shadow 0.28s;
      -webkit-app-region: no-drag;
    }

    .success-option:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(76,110,245,0.2);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(76,110,245,0.12);
    }

    .success-option-icon {
      width: 40px;
      height: 40px;
      background: rgba(76,110,245,0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .success-option-text {
      flex: 1;
    }

    .success-option-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 2px;
    }

    .success-option-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    .success-option-arrow {
      color: rgba(255,255,255,0.2);
      font-size: 18px;
    }

    /* Status bar */
    .status-bar {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .status-text {
      font-size: 10px;
      color: rgba(255,255,255,0.2);
    }

    .status-dots {
      display: flex;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.3s;
    }

    .status-dot.active {
      background: #4c6ef5;
      box-shadow: 0 0 10px rgba(76,110,245,0.5);
    }
  </style>
</head>
<body>
  <div class="installer">
    <!-- Animated Background -->
    <div class="bg-animation">
      <div class="bg-circle"></div>
      <div class="bg-circle"></div>
      <div class="bg-circle"></div>
    </div>
    <div class="particles" id="particles"></div>

    <!-- Content -->
    <div class="content">
      <!-- Header -->
      <div class="header">
        <div class="logo-area">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
              <path d="M9 14l2 2 4-4"/>
            </svg>
          </div>
          <div class="logo-text">
            <div class="logo-title">ClipMaster</div>
            <div class="logo-subtitle">安装向导</div>
          </div>
        </div>
        <button class="close-btn" onclick="closeInstaller()">×</button>
      </div>

      <!-- Welcome Page -->
      <div class="page active" id="welcomePage">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(76,110,245,0.8)" stroke-width="1.5">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            <path d="M9 14l2 2 4-4"/>
          </svg>
        </div>

        <h1 class="welcome-title">欢迎安装 ClipMaster</h1>
        <p class="welcome-desc">一款功能强大、界面美观的现代化剪贴板管理器</p>

        <div class="features">
          <div class="feature">
            <div class="feature-icon">📋</div>
            <div class="feature-text">实时监控剪贴板</div>
          </div>
          <div class="feature">
            <div class="feature-icon">🔍</div>
            <div class="feature-text">智能搜索过滤</div>
          </div>
          <div class="feature">
            <div class="feature-icon">⭐</div>
            <div class="feature-text">收藏重要内容</div>
          </div>
          <div class="feature">
            <div class="feature-icon">⌨️</div>
            <div class="feature-text">全局快捷键</div>
          </div>
        </div>

        <div class="install-path">
          <span class="install-path-label">安装目录</span>
          <input class="install-path-value" id="installPath" type="text" spellcheck="false" placeholder="输入安装目录" />
          <button class="install-path-btn" onclick="selectFolder()">更改</button>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="startInstall()">立即安装</button>
        </div>
      </div>

      <!-- Special Premium Page -->
      <div class="page special-page" id="specialPage">
        <div class="premium-stage">
          <div class="premium-orb"></div>
          <div class="premium-ring"></div>
          <div class="premium-ring secondary"></div>
          <div class="premium-core">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
              <path d="M9 14l2 2 4-4"/>
            </svg>
          </div>
        </div>

        <h2 class="premium-title">高级体验正在就绪</h2>
        <p class="premium-desc">正在为 ClipMaster 注入顺滑动效、快捷工作流与高效剪贴板体验</p>

        <div class="premium-chips">
          <span class="premium-chip">极速启动</span>
          <span class="premium-chip">平滑动画</span>
          <span class="premium-chip">智能历史</span>
          <span class="premium-chip">全局唤起</span>
        </div>

        <div class="premium-loading-line"></div>
      </div>

      <!-- Progress Page -->
      <div class="page progress-page" id="progressPage">
        <div class="progress-icon">
          <svg class="progress-ring" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#4c6ef5"/>
                <stop offset="100%" style="stop-color:#748ffc"/>
              </linearGradient>
            </defs>
            <circle class="progress-ring-bg" cx="50" cy="50" r="45"/>
            <circle class="progress-ring-fill" id="progressRing" cx="50" cy="50" r="45"/>
          </svg>
          <div class="progress-percentage" id="progressPercent">0%</div>
        </div>

        <div class="progress-title">正在安装...</div>
        <div class="progress-file" id="progressFile">准备中</div>

        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="progress-stats" id="progressStats">0 / 0 文件</div>
      </div>

      <!-- Success Page -->
      <div class="page" id="successPage">
        <div class="success-check">
          <svg viewBox="0 0 24 24">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </div>

        <h2 class="success-title">安装完成！</h2>
        <p class="success-desc">ClipMaster 已成功安装到您的电脑<br>使用 Ctrl+Shift+V 快速唤起</p>

        <div class="success-options">
          <div class="success-option" onclick="launchApp()">
            <div class="success-option-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4c6ef5" stroke-width="2">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                <path d="M9 14l2 2 4-4"/>
              </svg>
            </div>
            <div class="success-option-text">
              <div class="success-option-title">启动 ClipMaster</div>
              <div class="success-option-desc">立即开始使用</div>
            </div>
            <div class="success-option-arrow">→</div>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-secondary" onclick="closeInstaller()">完成</button>
        </div>
      </div>

      <!-- Status Bar -->
      <div class="status-bar">
        <span class="status-text">ClipMaster v1.0.0</span>
        <div class="status-dots">
          <div class="status-dot active" id="dot1"></div>
          <div class="status-dot" id="dot2"></div>
          <div class="status-dot" id="dot3"></div>
          <div class="status-dot" id="dot4"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron')

    // Create particles
    function createParticles() {
      const container = document.getElementById('particles')
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div')
        particle.className = 'particle'
        particle.style.left = Math.random() * 100 + '%'
        particle.style.animationDelay = Math.random() * 6 + 's'
        particle.style.animationDuration = (4 + Math.random() * 4) + 's'
        container.appendChild(particle)
      }
    }
    createParticles()

    // Load install path
    async function loadInstallPath() {
      const path = await ipcRenderer.invoke('get-install-path')
      document.getElementById('installPath').value = path
    }
    loadInstallPath()

    // Select folder
    async function selectFolder() {
      const path = await ipcRenderer.invoke('select-folder')
      if (path) {
        document.getElementById('installPath').value = path
      }
    }

    function getInstallPathInput() {
      return document.getElementById('installPath').value.trim()
    }

    // Page transitions
    function showPage(pageId, dotId) {
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'))
      document.getElementById(pageId).classList.add('active')

      document.querySelectorAll('.status-dot').forEach(dot => dot.classList.remove('active'))
      if (dotId) document.getElementById(dotId).classList.add('active')
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms))
    }

    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches

    let displayedProgress = 0
    let targetProgress = 0
    let progressMeta = { current: 0, total: 0, file: '准备中' }

    function updateProgressDom(progress, meta) {
      const ring = document.getElementById('progressRing')
      const circumference = 2 * Math.PI * 45
      ring.style.strokeDashoffset = circumference - (progress / 100) * circumference
      document.getElementById('progressPercent').textContent = progress + '%'
      document.getElementById('progressBar').style.width = progress + '%'
      document.getElementById('progressFile').textContent = meta.file || '准备中'
      document.getElementById('progressStats').textContent = `${meta.current || 0} / ${meta.total || 0} 文件`
    }

    let progressAnimationId = null

    function renderProgress() {
      displayedProgress += (targetProgress - displayedProgress) * 0.14
      if (Math.abs(targetProgress - displayedProgress) < 0.12) displayedProgress = targetProgress
      updateProgressDom(Math.round(displayedProgress), progressMeta)
      progressAnimationId = requestAnimationFrame(renderProgress)
    }

    function startProgressAnimation() {
      if (progressAnimationId === null) {
        progressAnimationId = requestAnimationFrame(renderProgress)
      }
    }

    function stopProgressAnimation() {
      if (progressAnimationId !== null) {
        cancelAnimationFrame(progressAnimationId)
        progressAnimationId = null
      }
    }

    // Start installation
    async function startInstall() {
      const customInstallPath = getInstallPathInput()
      if (!customInstallPath) {
        alert('请输入安装目录')
        document.getElementById('installPath').focus()
        return
      }

      try {
        await ipcRenderer.invoke('set-install-path', customInstallPath)

        showPage('specialPage', 'dot2')
        await sleep(reducedMotion ? 120 : 1400)

        showPage('progressPage', 'dot3')
        targetProgress = 0
        displayedProgress = 0
        progressMeta = { current: 0, total: 0, file: '准备中' }
        updateProgressDom(0, progressMeta)
        startProgressAnimation()

        // Start installation
        const result = await ipcRenderer.invoke('start-install', customInstallPath)
        stopProgressAnimation()

        if (result.success) {
          targetProgress = 100
          displayedProgress = 100
          updateProgressDom(100, progressMeta)
          showPage('successPage', 'dot4')
        } else {
          alert('安装失败: ' + result.error)
          showPage('welcomePage', 'dot1')
        }
      } catch (error) {
        stopProgressAnimation()
        alert('安装失败: ' + (error && error.message ? error.message : String(error)))
        showPage('welcomePage', 'dot1')
      }
    }

    // Listen for progress updates
    ipcRenderer.on('install-progress', (event, data) => {
      const { progress, current, total, file } = data
      targetProgress = progress
      progressMeta = { current, total, file }
    })

    // Launch app
    function launchApp() {
      ipcRenderer.invoke('launch-app')
    }

    // Close installer
    function closeInstaller() {
      ipcRenderer.invoke('close-installer')
    }
  </script>
</body>
</html>
