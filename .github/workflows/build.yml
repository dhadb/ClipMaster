name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build -- --publish never

      - name: Generate SHA256 checksums
        shell: powershell
        run: |
          Get-FileHash -Algorithm SHA256 release/*.exe |
            ForEach-Object { "$($_.Hash)  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding ascii release/checksums.sha256

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipMaster-Windows
          path: |
            release/*.exe
            release/*.blockmap
            release/checksums.sha256
